{% extends "base.html" %}
{% block title %}CSE(AI&ML) Coding Contest — Forgot Password{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="hero-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="hero-content fade-in">
        <div class="college-logo-container" style="margin-bottom: 2rem; text-align: center;">
            <img src="{{ url_for('static', filename='college_logo.png') }}" alt="College Logo"
                style="width: 100%; max-width: 600px; height: auto; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
        </div>

        <h1 class="hero-title" style="font-size: 2rem; margin-bottom: 1rem;">Reset Password</h1>
        <p class="hero-subtitle">
            Enter your details below to reset your password.
        </p>

        <form action="/forgot-password" method="POST" style="text-align: left; max-width: 320px; margin: 0 auto;">
            <div style="margin-bottom: 1rem;">
                <label
                    style="display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">Registration
                    ID</label>
                <input type="text" name="reg_id" required value="{{ reg_id or '' }}" placeholder="Enter your ID"
                    {{ 'readonly' if verified else '' }}
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">Registered
                    Email</label>
                <input type="email" name="email" required value="{{ email or '' }}" placeholder="name@example.com"
                    {{ 'readonly' if verified else '' }}
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none;">
            </div>

            {% if verified %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">New
                    Password</label>
                <input type="password" name="new_password" required placeholder="Enter new password"
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none;">
            </div>
            {% endif %}

            <button type="submit" class="btn" id="submit-btn"
                style="width: 100%; background: #f3f4f6; color: #111827; border: none; font-weight: 700;">
                {{ 'Reset Password' if verified else 'Verify Details' }}
            </button>
        </form>

        <p style="margin-top: 2rem;">
            <a href="/" style="color: var(--text-muted); font-size: 0.85rem;">← Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
